- type: pointOfInterest
  id: Nfsd
  parent: BasePOI
  name: 'ColSec Sector FOB'
  minimumDistance: 3750
  maximumDistance: 5000
  spawnGroup: Required
  gridPath: /Maps/_NF/POI/nfsd.yml
  addComponents:
  - type: IFF
    color: "#ae7d57"
  - type: ProtectedGrid
    preventEmpEvents: true
  - type: StationTransit
    routes:
      SpawnPoints: 10

- type: gameMap
  id: Nfsd
  mapName: 'ColSec Sector FOB'
  mapPath: /Maps/_NF/POI/nfsd.yml
  minPlayers: 0
  stations:
    Nfsd:
      stationProto: SecurityFrontierOutpost
      components:
        - type: StationNameSetup
          mapNameTemplate: 'ColSec Sector FOB'
        - type: ExtraStationInformation
          iconPath: /Textures/_NF/Structures/Decoration/banner.rsi/nfsd-banner.png
          stationSubtext: 'frontier-lobby-Colsec-subtext'
          stationDescription: 'frontier-lobby-Colsec-description'
          lobbySortOrder: 2
        - type: StationJobs
          availableJobs:
            HeadOfSecurity: [ 1, 1 ]
            SeniorOfficer: [ 2, 2 ]
            SecurityOfficer: [ 4, 4 ]
            Warden: [ 1, 1 ]
            SecurityCadet: [ 2, 2 ] #intern, not counted
            Detective: [ 1, 1 ]
            Brigmedic: [ 1, 1 ]
            # Others:
            #PublicAffairsLiaison: [ 1, 1 ] # Mono
          tags:
          - HeadOfPersonnel
          - HeadOfSecurity
        - type: StationDeadDropReporting
          messageSet: Nfsd
        - type: StationDeadDropHintExempt
